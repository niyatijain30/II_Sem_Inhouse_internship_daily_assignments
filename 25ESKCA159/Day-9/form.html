<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>

  <body>
    <div class="container">
      <form
action="registration.php"
method="post"
enctype="multipart/form-data">
        <h1>Registration Form</h1>
        <hr>
        <label>Image</label>
        <input type="file" name="image" id="" required>

        <label>Full Name</label>
        <input type="text" name = "name" placeholder="Enter full name" required />

        <label>Email Address</label>
        <input type="email" name = "email" placeholder="Enter email address" required />

        <label for="">Branch</label>
        <select name="branch" id="">
          <option value="">Select Your Branch</option>
          <option value="CSE">CSE</option>
          <option value="AI">AI</option>
          <option value="DS">DS</option>
          <option value="IT">IT</option>
        </select>

        <label for="">CGPA</label>
        <input type="text" name="cgpa" placeholder="Enter Your cgpa" required>


        <div class="row">
          <div class="col">
            <label>Phone Number</label>
            <input type="tel" name = "phone" placeholder="Enter phone number" required/>
          </div>

          <div class="col">
            <label>Birth Date</label>
            <input type="date" name = "date" required/>
          </div>
        </div>

        <label>Gender</label>

        <div class="gender">
         <input type="radio" name="gender" value="Male" required> Male

<input type="radio" name="gender" value="Female" required> Female

<input type="radio" name="gender" value="Prefer not to say" required>
Prefer not to say
        </div>

        <label>Address</label>
        <input type="text" name = "address1" required placeholder="Enter street address" />

        <input type="text" name = "address2" required placeholder="Enter street address line 2" />

        <div class="row">
          <div class="col">
            <select name="country">
              <option>Country</option>
              <option>India</option>
              <option>USA</option>
            </select>
          </div>

          <div class="col">
            <input type="text" name = "city" required placeholder="Enter your city" />
          </div>
        </div>

        <div class="row">
          <div class="col">
          <input
type="text"
name="region" required
placeholder="Enter your region">
          </div>

          <div class="col">
            <input
type="text"
name="postal" required
placeholder="Enter postal code">
          </div>
        </div>

        <button type = "submit">Submit</button>
      </form>
    </div>
  </body>
</html>
